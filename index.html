<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatatan Keuangan</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold mb-4 text-center text-blue-600">Catat Keuangan</h2>
        
        <form id="financeForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Tipe Transaksi</label>
                <select id="tipe" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" required>
                    <option value="Pemasukan">Pemasukan</option>
                    <option value="Pengeluaran">Pengeluaran</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Nominal (Rp)</label>
                <input type="number" id="nominal" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" placeholder="Contoh: 50000" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Deskripsi</label>
                <input type="text" id="deskripsi" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border" placeholder="Contoh: Beli Makan Siang" required>
            </div>
            
            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition font-bold">
                Simpan Data
            </button>
        </form>

        <div id="autoResponseMsg" class="mt-4 p-4 text-sm hidden rounded whitespace-pre-wrap"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
