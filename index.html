<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Kas UMKM</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 pb-20">

    <header class="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-xl font-bold text-center">Buku Kas UMKM</h1>
    </header>

    <main class="p-4 max-w-2xl mx-auto space-y-6">
        <div id="alertBox" class="hidden p-4 rounded text-sm font-bold text-white shadow-lg"></div>

        <section class="bg-white p-5 rounded-xl shadow-md border-t-4 border-emerald-500">
            <p class="text-sm text-gray-500 font-semibold mb-1">Sisa Uang Tunai / Saldo</p>
            <h2 id="txtSaldo" class="text-3xl font-black text-emerald-600">Rp 0</h2>
            
            <div class="flex justify-between mt-4 border-t pt-3">
                <div>
                    <p class="text-xs text-gray-500">Uang Masuk</p>
                    <p id="txtMasuk" class="text-sm font-bold text-blue-600">Rp 0</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500">Uang Keluar</p>
                    <p id="txtKeluar" class="text-sm font-bold text-red-600">Rp 0</p>
                </div>
            </div>
        </section>

        <section class="bg-white p-5 rounded-xl shadow-md">
            <h3 class="font-bold text-lg mb-4 border-b pb-2">Catat Transaksi</h3>
            <form id="formKas" class="space-y-4">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Tanggal</label>
                        <input type="date" id="inputTanggal" class="w-full p-2 border rounded-lg bg-gray-50 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Jenis</label>
                        <select id="inputTipe" class="w-full p-2 border rounded-lg bg-gray-50 text-sm font-bold" required>
                            <option value="Masuk" class="text-blue-600">Uang Masuk</option>
                            <option value="Keluar" class="text-red-600">Uang Keluar</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Nominal (Rp)</label>
                    <input type="number" id="inputNominal" class="w-full p-3 border border-emerald-300 rounded-lg text-lg font-bold bg-emerald-50 focus:ring-2 focus:ring-emerald-500" placeholder="0" required min="1">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Kategori</label>
                        <input type="text" id="inputKategori" class="w-full p-2 border rounded-lg bg-gray-50 text-sm" placeholder="Contoh: Penjualan, Gaji, dll" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Metode Pembayaran</label>
                        <select id="inputMetode" class="w-full p-2 border rounded-lg bg-gray-50 text-sm">
                            <option value="Tunai">Tunai / Cash</option>
                            <option value="Transfer Bank">Transfer Bank</option>
                            <option value="e-Wallet">e-Wallet (OVO, Gopay, dll)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Upload Bukti/Nota (Opsional)</label>
                    <input type="file" id="inputFoto" accept="image/*" class="w-full p-2 border rounded-lg bg-gray-50 text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Catatan Tambahan</label>
                    <textarea id="inputCatatan" rows="2" class="w-full p-2 border rounded-lg bg-gray-50 text-sm" placeholder="Keterangan opsional..."></textarea>
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-emerald-600 text-white p-3 rounded-xl font-bold text-lg hover:bg-emerald-700 transition shadow-lg">Simpan Transaksi</button>
            </form>
        </section>

        <section class="bg-white p-5 rounded-xl shadow-md">
            <h3 class="font-bold text-lg mb-4 border-b pb-2">10 Transaksi Terakhir</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <tbody id="tabelRiwayat" class="divide-y divide-gray-100">
                        <tr><td class="py-4 text-center text-gray-400">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
